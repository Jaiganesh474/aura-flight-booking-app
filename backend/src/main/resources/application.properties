# Server Configuration
server.port=8080

# Database Configuration (MySQL by default, support overrides for Render deployment)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/airlinedb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:123456}

# JPA / Hibernate Configurations
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configurations
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Google Gemini API Configurations
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# Swagger UI Configurations
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Brevo (Sendinblue) SMTP Email Configuration
# Get your SMTP key at: https://app.brevo.com/settings/keys/smtp
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=a443db001@smtp-brevo.com
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

